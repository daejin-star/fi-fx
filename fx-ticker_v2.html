<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #131722; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; overflow: hidden; }

    .ticker-wrap {
      width: 100%;
      overflow: hidden;
      background: #131722;
      border-bottom: 1px solid #2a2e39;
      height: 46px;
      display: flex;
      align-items: center;
    }

    .ticker-label {
      background: #e53935;
      color: #fff;
      font-size: 11px;
      font-weight: 600;
      padding: 4px 10px;
      white-space: nowrap;
      height: 100%;
      display: flex;
      align-items: center;
      letter-spacing: 0.5px;
      z-index: 2;
      flex-shrink: 0;
    }

    .ticker-track-wrap {
      overflow: hidden;
      flex: 1;
      height: 100%;
      display: flex;
      align-items: center;
    }

    .ticker-track {
      display: flex;
      align-items: center;
      white-space: nowrap;
      animation: scroll 30s linear infinite;
    }

    .ticker-track:hover { animation-play-state: paused; }

    @keyframes scroll {
      0%   { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }

    .ticker-item {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 0 24px;
      border-right: 1px solid #2a2e39;
      height: 46px;
      cursor: default;
    }

    .ticker-item:hover { background: #1e222d; }

    .ticker-name { font-size: 13px; font-weight: 600; color: #d1d4dc; }
    .ticker-rate { font-size: 13px; font-weight: 500; color: #ffffff; }
    .ticker-change { font-size: 11px; font-weight: 500; display: flex; align-items: center; gap: 2px; }

    .up { color: #26a69a; }
    .down { color: #ef5350; }
    .neutral { color: #888; }

    .loading { color: #888; font-size: 12px; padding: 0 20px; }
    .updated { color: #555; font-size: 10px; padding: 0 16px; white-space: nowrap; flex-shrink: 0; }
  </style>
</head>
<body>
  <div class="ticker-wrap">
    <div class="ticker-label">LIVE FX</div>
    <div class="ticker-track-wrap">
      <div class="ticker-track" id="track">
        <span class="loading">환율 데이터 로딩 중...</span>
      </div>
    </div>
    <div class="updated" id="updated"></div>
  </div>

  <script>
    const pairs = [
      { code: 'USD', name: 'USD/KRW' },
      { code: 'EUR', name: 'EUR/KRW' },
      { code: 'GBP', name: 'GBP/KRW' },
      { code: 'CAD', name: 'CAD/KRW' },
      { code: 'JPY', name: 'JPY/KRW' },
    ];

    let prevRates = {};

    function buildItems(rates) {
      const items = pairs.map(p => {
        const rate = rates[p.code];
        if (!rate) return '';
        const prev = prevRates[p.code] || rate;
        const change = rate - prev;
        const changePct = prev ? ((change / prev) * 100) : 0;
        const cls = change > 0 ? 'up' : change < 0 ? 'down' : 'neutral';
        const sign = change > 0 ? '+' : '';
        const fmt = p.code === 'JPY' ? rate.toFixed(4) : Math.round(rate).toLocaleString();
        const arrow = change > 0 ? '▲' : change < 0 ? '▼' : '–';
        return `<div class="ticker-item">
          <span class="ticker-name">${p.name}</span>
          <span class="ticker-rate">${fmt}</span>
          <span class="ticker-change ${cls}">${arrow} ${sign}${changePct.toFixed(2)}%</span>
        </div>`;
      }).join('');
      return items + items;
    }

    async function fetchRates() {
      try {
        const res = await fetch('https://api.exchangerate-api.com/v4/latest/KRW');
        const data = await res.json();
        const rates = {};
        pairs.forEach(p => { rates[p.code] = 1 / data.rates[p.code]; });

        document.getElementById('track').innerHTML = buildItems(rates);

        const now = new Date();
        document.getElementById('updated').textContent =
          `업데이트 ${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;

        prevRates = { ...rates };
      } catch (e) {
        document.getElementById('track').innerHTML = '<span class="loading">데이터를 불러올 수 없습니다</span>';
      }
    }

    fetchRates();
    setInterval(fetchRates, 60000);
  </script>
</body>
</html>
